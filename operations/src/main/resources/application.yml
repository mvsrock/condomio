server:
  port: 8094

spring:
  main:
    banner-mode: off
  application:
    name: operations-service
  security:
    oauth2:
      resource-server:
        jwt:
          jwk-set-uri: ${keycloak.auth-server-url}/realms/${keycloak.realm}/protocol/openid-connect/certs
  mongodb:
    uri: ${SPRING_MONGODB_URI:${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/condomio}}
    database: ${SPRING_MONGODB_DATABASE:${SPRING_DATA_MONGODB_DATABASE:condomio}}
  cloud:
    discovery:
      enabled: true

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka
    register-with-eureka: true
    fetch-registry: true
  instance:
    instance-id: ${spring.application.name}
    prefer-ip-address: true
    hostname: ${spring.application.name}
    nonSecurePort: 8094
    app-group-name: ${spring.application.name}

keycloak:
  auth-server-url: http://localhost:8082
  realm: condominio

app:
  # Shared key usata per chiamare gli endpoint interni signed di core.
  core:
    internal:
      shared-key: ${APP_INTERNAL_OPERATIONS_SHARED_KEY:change-me-ops-key}
  jobs:
    executor:
      core-pool-size: 2
      max-pool-size: 8
      queue-capacity: 200
      await-termination-seconds: 30
    list:
      default-limit: 30
      max-limit: 200
    solleciti:
      default-min-days-overdue: 1
      min-days-overdue-min: 0
      min-days-overdue-max: 3650
      channel: email
      title: "Sollecito automatico"
      note: "Generato automaticamente per debito scaduto"
      promote-in-bonis-to-sollecitato: true
      deduplicate-per-day: true
    reminder:
      default-max-days-ahead: 7
      max-days-ahead-min: 0
      max-days-ahead-max: 365
      channel: email
      title: "Promemoria scadenza rata"
      note-pattern: "Rate in scadenza entro %d giorni: %d, scoperto totale %.2f"
      nearest-due-date-pattern: ", prima scadenza %s"
      deduplicate-per-day: true

logging:
  level:
    "[it.condomio]": DEBUG
