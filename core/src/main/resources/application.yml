server:
  port: 8090

spring:
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB
  devtools:
    restart:
      enabled: true
 # config:
 #   import: optional:file:///C:/ciro/daje.yml
  application:
    name: core
  main:
    banner-mode: off
  security:
    oauth2:
      resource-server:
        jwt:
       #   issuer-uri: ${keycloak.auth-server-url}/realms/${keycloak.realm}
          jwk-set-uri: ${keycloak.auth-server-url}/realms/${keycloak.realm}/protocol/openid-connect/certs
  mongodb:
    uri: ${SPRING_MONGODB_URI:${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/condomio}}
    database: ${SPRING_MONGODB_DATABASE:${SPRING_DATA_MONGODB_DATABASE:condomio}}
  data:
    redis:
      host: localhost
      port: 6379
  cache:
    type: redis

  cloud:
    discovery:
      enabled: true

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka
    register-with-eureka: true
    fetch-registry: true
  instance:
    instance-id: ${spring.application.name}
    prefer-ip-address: true
    hostname: ${spring.application.name}
    nonSecurePort: 8090
    app-group-name: ${spring.application.name} #quando sta in yml del ide legge questo


keycloak:
  auth-server-url: http://localhost:8082
  realm: condominio
  resource: admin-cli
  credentials:
    username: ${KEYCLOAK_USER:admin}
    password: ${KEYCLOAK_PASS:admin}

app:
  cors:
    allowed-origins: "*"
  http-logging:
    enabled: true
    max-payload-length: 12000
    exclude-path-prefixes: /actuator,/v3/api-docs,/swagger-ui,/favicon.ico
  cache:
    enabled: false
    prefetch-pages: 5
    default-ttl: PT1H
  properties:
    enabled: true
  # Fase 8: automazioni dashboard/job asincroni completamente configurabili.
  # Evita costanti hardcoded nel codice business.
  jobs:
    executor:
      core-pool-size: 2
      max-pool-size: 8
      queue-capacity: 200
      await-termination-seconds: 30
    list:
      default-limit: 30
      max-limit: 200
    solleciti:
      default-min-days-overdue: 1
      min-days-overdue-min: 0
      min-days-overdue-max: 3650
      channel: email
      title: "Sollecito automatico"
      note: "Generato automaticamente per debito scaduto"
      promote-in-bonis-to-sollecitato: true
      deduplicate-per-day: true
    reminder:
      default-max-days-ahead: 7
      max-days-ahead-min: 0
      max-days-ahead-max: 365
      channel: email
      title: "Promemoria scadenza rata"
      note-pattern: "Rate in scadenza entro %d giorni: %d, scoperto totale %.2f"
      nearest-due-date-pattern: ", prima scadenza %s"
      deduplicate-per-day: true


logging:
  level:
    "[org.springframework.security]": INFO
    "[it.condomio]": DEBUG
    "[org.springframework.security.oauth2]": INFO
    "[jboss.resteasy.client]": INFO
    "[org.springframework.cache]": TRACE
    "[org.springframework.data.redis.cache]": DEBUG
    "[org.springframework.data.redis.core]": DEBUG
    "[org.springframework.boot.context.config]": DEBUG
